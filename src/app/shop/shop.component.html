<article>
  <div class="sidebar">
    <app-sidebar
      (sendBrands)="switchBrands($event)"
      (sendAllProducts)="showProducts(1)"
      (sendFilterData)="filterProducts($event)"
      (sendSearchInfo)="search($event)"
    ></app-sidebar>
  </div>
  <section class="container">
    <main>
      @for (item of productList; track $index) {
        <div class="card">
         
          <h6 [style.display]="item.stock > 0 ? 'none' : 'unset'">
            {{ item.stock <= 0 ? "Out of Stock" : "" }}
          </h6>
          <img [src]="item.thumbnail" (error)="item.thumbnail = altImage" alt="product" />
          <h4>{{ item.title }}</h4>
          <h2>${{ item.price.current }} <span>${{ item.price.beforeDiscount }}</span></h2>
          
          <button routerLink="/details/{{ item._id }}">View More</button>
        </div>
      }
    </main>
    
      
      <div class="pages">
        <button [disabled]="currentPage === 1" class="arrows">
          &larr; prev
        </button>
        @for (item of [].constructor(maxPage); track $index) {
          <button (click)="showProducts($index + 1)"  [class.current]="$index + 1 == currentPage">
            {{ $index + 1 }}
          </button>
        }
        <button [disabled]="currentPage === maxPage"  class="arrows">next &rarr;</button>
        
      </div>
    
  </section>
</article>
