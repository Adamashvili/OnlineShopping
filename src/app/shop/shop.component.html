
<article>
  <div class="sidebar">
    <app-sidebar
      (sendBrands)="switchBrands($event)"
      (sendAllProducts)="showProducts(1, pageSize)"
      (sendFilterData)="filterProducts($event)"
      (sendSearchInfo)="search($event)"
    ></app-sidebar>
  </div>
  <section class="container">
    <main>
      @for (item of productList; track $index) {
        <div class="card">
          <h6 [style.display]="item.stock > 0 ? 'none' : 'unset'">
            {{ item.stock <= 0 ? "Out of Stock" : "" }}
          </h6>
          <img
            [src]="
              !item.images[0] || item.images[0].startsWith('https://alta.ge')
                ? altImage
                : item.images[0]
            "
            alt="product"
          />
          <h4>{{ item.title }}</h4>
          <h2>$ {{ item.price.current }}</h2>
          <p>Old Price: <span>${{ item.price.beforeDiscount }}</span> </p>
          <button routerLink="/details/{{item._id}}">View More</button>
        </div>
      }
    </main>
    <div class="bottomArea">
      <span></span>
      <div class="pages">
        <button
          [disabled]="currentPage === 1"
          (click)="prevPage()"
          class="arrows"
        >
          &larr; prev
        </button>
        @for (item of pageList; track $index) {
          <button
            [class.current]="item == currentPage"
            (click)="
              !isCategoryShown
                ? showProducts(item, pageSize)
                : showByCategory(currentCategory, item)
            "
          >
            {{ item }}
          </button>
        }
        <button
          [disabled]="currentPage === pageList.length"
          (click)="nextPage()"
          class="arrows"
        >
          next &rarr;
        </button>
      </div>
      @if (productList.length > 10) {
        <div class="sizePerPage">
          <label for="">Items per Page:</label>
          <select (change)="changePageSize()" [(ngModel)]="pageSize">
            <option value="">All</option>
            <option value="5">5</option>
            <option value="10">10</option>
            <option value="15">15</option>
            <option value="20">20</option>
            <option value="25">25</option>
          </select>
        </div>
      } @else {
        <span></span>
      }
    </div>
  </section>
</article>
